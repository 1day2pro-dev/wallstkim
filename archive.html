<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미국 증시 방송 아카이브</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --text2: #515154;
    --text3: #86868b;
    --border: #e5e5ea;
    --accent: #0066cc;
    --up: #d93025;
    --dn: #1a73e8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }
  header { margin-bottom: 24px; }
  h1 { margin: 0 0 6px; font-size: 28px; font-weight: 800; }
  .subtitle { color: var(--text3); font-size: 14px; }
  .stat-bar {
    display: flex; gap: 16px; margin: 20px 0;
    padding: 14px 18px; background: var(--card); border-radius: 12px;
    border: 1px solid var(--border); font-size: 14px;
  }
  .stat-bar strong { font-size: 17px; color: var(--accent); }
  .date-group {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 10px; overflow: hidden;
  }
  .date-title {
    padding: 14px 20px;
    font-weight: 800; font-size: 17px;
    background: linear-gradient(180deg, #fafafa, #ffffff);
    border-bottom: 1px solid var(--border);
  }
  .date-title .weekday { color: var(--text3); font-weight: 500; margin-left: 8px; font-size: 14px; }
  .date-title .count { float: right; color: var(--text3); font-weight: 500; font-size: 14px; }
  .item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-top: 1px solid var(--border);
  }
  .item:first-of-type { border-top: none; }
  .time {
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 14px; color: var(--text2); min-width: 60px;
  }
  .title { flex: 1; margin: 0 16px; color: var(--text); font-size: 14px; }
  .size { color: var(--text3); font-size: 12px; font-family: monospace; margin-right: 14px; }
  .view-btn {
    color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px;
    padding: 4px 10px; border-radius: 6px;
  }
  .view-btn:hover { background: #e8f0fe; }
  .loading, .empty { text-align: center; padding: 40px; color: var(--text3); }
  .nav { margin-bottom: 20px; }
  .nav a {
    color: var(--accent); text-decoration: none; font-size: 14px; margin-right: 16px;
  }
  .nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="nav">
      <a href="index.html">← 최신 방송</a>
    </div>
    <h1>📺 방송 아카이브</h1>
    <div class="subtitle">과거 방송 HTML 모아보기</div>
  </header>

  <div class="stat-bar" id="stat">불러오는 중...</div>
  <div id="list"></div>
</div>

<script>
const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];

function fmtSize(n) {
  if (n < 1024) return n + 'B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + 'KB';
  return (n / 1024 / 1024).toFixed(1) + 'MB';
}

fetch('archive.json?_=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const stat = document.getElementById('stat');
    const list = document.getElementById('list');

    if (!data.items || data.items.length === 0) {
      stat.innerHTML = '<span>아직 아카이브된 방송이 없습니다.</span>';
      list.innerHTML = '<div class="empty">아카이브를 실행하면 이곳에 표시됩니다.</div>';
      return;
    }

    stat.innerHTML =
      `총 <strong>${data.count}</strong>개 방송 · ` +
      `<span style="color:var(--text3)">마지막 갱신: ${data.updated}</span>`;

    // 날짜별 그룹
    const byDate = {};
    data.items.forEach(it => {
      (byDate[it.trd_ymd] = byDate[it.trd_ymd] || []).push(it);
    });

    const dates = Object.keys(byDate).sort().reverse();
    dates.forEach(d => {
      const items = byDate[d];
      const dt = new Date(d + 'T00:00:00');
      const wd = WEEKDAYS[dt.getDay()];

      const group = document.createElement('div');
      group.className = 'date-group';

      const title = document.createElement('div');
      title.className = 'date-title';
      title.innerHTML =
        `${d} <span class="weekday">(${wd})</span>` +
        `<span class="count">${items.length}건</span>`;
      group.appendChild(title);

      items.forEach(it => {
        const row = document.createElement('div');
        row.className = 'item';
        row.innerHTML =
          `<span class="time">${it.time}</span>` +
          `<span class="title">미국 증시 마감 동향</span>` +
          `<span class="size">${fmtSize(it.size)}</span>` +
          `<a class="view-btn" href="${it.url}" target="_blank">보기 →</a>`;
        group.appendChild(row);
      });

      list.appendChild(group);
    });
  })
  .catch(err => {
    document.getElementById('stat').textContent = '로드 실패: ' + err.message;
  });
</script>
</body>
</html>
